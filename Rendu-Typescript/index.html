<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="public/index.js" type="module"></script>
  <title>Document</title>
</head>
<body>
  <header>
    <h1>Task Manager</h1>
    <button onclick="logout()">Logout</button>
  </header>

  <form id="new-task-form" class="task-form">
    <input type="text" id="new-task" placeholder="Task title" required>
    <textarea id="task-description" placeholder="Task description"></textarea>
    <input type="datetime-local" id="task-deadline">
    <button type="submit">Add Task</button>
  </form>

  <ul id="list"></ul>

  <script>
    function logout() {
      localStorage.removeItem("CURRENT_USER");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
